<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - Vento Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="d-flex" id="wrapper">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar-wrapper">
        <div class="logo-section p-4 mb-2 text-white text-center">
            <img src="LogoVP.png" alt="Logo" class="img-fluid mb-3 sidebar-logo-img" style="max-height: 140px; width: auto;">
            <h5 class="fw-bold mb-0 gradient-text" style="letter-spacing: 1px; font-size: 1.5rem;">Vento Planner</h5>
        </div>
        <div class="list-group list-group-flush px-2">
            <a href="index.html" class="list-group-item list-group-item-action"><i class="bi bi-house-door me-3"></i>Inicio</a>
            <a href="eventos.html" class="list-group-item list-group-item-action"><i class="bi bi-calendar-event me-3"></i>Eventos</a>
            <a href="reportes.html" class="list-group-item list-group-item-action"><i class="bi bi-bar-chart-line me-3"></i>Reportes</a>
            <a href="tipos_eventos.html" class="list-group-item list-group-item-action"><i class="bi bi-trophy me-3"></i>Tipos de Eventos</a>
            <a href="servicios.html" class="list-group-item list-group-item-action"><i class="bi bi-tools me-3"></i>Servicios</a>
            <a href="configuracion.html" class="list-group-item list-group-item-action active mt-3"><i class="bi bi-gear me-3"></i>Configuración</a>
        </div>
    </div>

    <!-- CONTENIDO -->
    <div id="page-content-wrapper">
        <nav class="navbar navbar-dark bg-transparent py-3 px-4">
            <div class="container-fluid justify-content-end">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-3"><a class="nav-link text-white fs-5" href="#"><i class="bi bi-bell"></i></a></li>
                    <li class="nav-item"><img src="usuario.png" alt="Perfil" class="rounded-circle border border-2 border-white" width="40" height="40"></li>
                </ul>
            </div>
        </nav>

        <div class="container-fluid px-5 pt-2 pb-5">
            <div class="mb-4 text-white">
                <h2 class="fw-bold">Configuración</h2>
                <p class="text-white-50">Administra las preferencias del sistema</p>
            </div>

            <div class="row g-4">
                <!-- Perfil -->
                <div class="col-lg-6">
                    <div class="glass-card">
                        <h5 class="text-white fw-semibold mb-4"><i class="bi bi-person-circle me-2 icon-gold"></i>Perfil de Usuario</h5>
                        <div class="mb-3">
                            <label class="form-label text-white-50 small">Nombre completo</label>
                            <input type="text" class="form-control form-control-glass" value="Administrador">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white-50 small">Correo electrónico</label>
                            <input type="email" class="form-control form-control-glass" value="admin@ventoplanner.com">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-white-50 small">Teléfono</label>
                            <input type="tel" class="form-control form-control-glass" value="+503 7000-0000">
                        </div>
                        <button class="btn btn-gold px-4">Guardar Cambios</button>
                    </div>
                </div>

                <!-- Seguridad -->
                <div class="col-lg-6">
                    <div class="glass-card">
                        <h5 class="text-white fw-semibold mb-4"><i class="bi bi-shield-lock me-2 icon-purple"></i>Seguridad</h5>
                        <div class="mb-3">
                            <label class="form-label text-white-50 small">Contraseña actual</label>
                            <input type="password" class="form-control form-control-glass" placeholder="••••••••">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white-50 small">Nueva contraseña</label>
                            <input type="password" class="form-control form-control-glass" placeholder="••••••••">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-white-50 small">Confirmar nueva contraseña</label>
                            <input type="password" class="form-control form-control-glass" placeholder="••••••••">
                        </div>
                        <button class="btn btn-gold px-4">Actualizar Contraseña</button>
                    </div>
                </div>

                <!-- Preferencias del Sistema -->
                <div class="col-12">
                    <div class="glass-card">
                        <h5 class="text-white fw-semibold mb-4"><i class="bi bi-sliders me-2 icon-gold"></i>Preferencias del Sistema</h5>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label text-white-50 small">Moneda</label>
                                <select class="form-select form-select-glass">
                                    <option>USD - Dólar</option>
                                    <option>EUR - Euro</option>
                                    <option>MXN - Peso Mexicano</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-white-50 small">Idioma</label>
                                <select class="form-select form-select-glass">
                                    <option>Español</option>
                                    <option>English</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-white-50 small">Zona Horaria</label>
                                <select class="form-select form-select-glass">
                                    <option>America/El_Salvador (GMT-6)</option>
                                    <option>America/Mexico_City (GMT-6)</option>
                                    <option>America/Bogota (GMT-5)</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-4">
                            <button class="btn btn-gold px-4">Guardar Preferencias</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
